<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ferricar | Dashboard Operativo v3</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: #f1f5f9; }
        .glass-card { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .tab-active { background: #3b82f6; color: white; box-shadow: 0 0 15px rgba(59, 130, 246, 0.4); }
        .loading-overlay { background: #020617; position: fixed; inset: 0; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        select option { background-color: #0f172a; color: white; }
    </style>
</head>
<body class="min-h-screen">

    <div id="loader" class="loading-overlay">
        <div class="w-12 h-12 border-4 border-blue-500 border-t-transparent rounded-full animate-spin mb-4"></div>
        <h2 class="text-blue-500 font-bold tracking-widest animate-pulse">SINCRONIZANDO FILAS...</h2>
    </div>

    <header class="sticky top-0 z-50 glass-card border-b border-slate-800 px-6 py-4">
        <div class="max-w-[1600px] mx-auto flex flex-col md:flex-row justify-between items-center gap-6">
            <div class="flex items-center gap-3">
                <div class="p-2 bg-blue-600 rounded-lg"><i data-lucide="truck" class="text-white w-6 h-6"></i></div>
                <h1 class="text-xl font-bold uppercase tracking-tighter">FERRICAR <span class="text-blue-400 font-light text-sm ml-2">SISTEMA DE CONTROL</span></h1>
            </div>
            <nav class="flex bg-slate-900 rounded-xl p-1 border border-slate-800">
                <button onclick="showTab('operativo')" id="btn-operativo" class="tab-active px-6 py-2 rounded-lg text-xs font-bold uppercase">Operativo</button>
                <button onclick="showTab('plasticas')" id="btn-plasticas" class="px-6 py-2 rounded-lg text-xs font-bold text-slate-400 uppercase">Activos</button>
                <button onclick="showTab('auxiliares')" id="btn-auxiliares" class="px-6 py-2 rounded-lg text-xs font-bold text-slate-400 uppercase">Auxiliares</button>
            </nav>
            <div id="conn-status" class="flex items-center gap-2 text-[10px] font-black uppercase py-2 px-4 rounded-full bg-slate-800 border border-slate-700">
                <span id="status-dot" class="w-2 h-2 bg-slate-500 rounded-full"></span>
                <span id="status-text">Buscando Datos</span>
            </div>
        </div>
    </header>

    <main class="max-w-[1600px] mx-auto p-6">
        <!-- SELECTOR DE MES -->
        <div class="glass-card rounded-2xl p-8 mb-8 border-l-4 border-blue-500">
            <div class="flex flex-col md:flex-row md:items-center gap-6">
                <div class="bg-blue-500/10 p-4 rounded-full"><i data-lucide="calendar" class="text-blue-500 w-8 h-8"></i></div>
                <div class="flex-1">
                    <p class="text-xs text-slate-500 font-black uppercase mb-2">Seleccionar Periodo (Mes)</p>
                    <select id="month-filter" onchange="applyFilters()" class="w-full md:w-64 bg-slate-900 text-white text-2xl font-bold outline-none border border-slate-700 rounded-xl px-4 py-3 focus:ring-2 focus:ring-blue-500 cursor-pointer">
                        <option value="">Detectando tabla...</option>
                    </select>
                </div>
            </div>
        </div>

        <div id="main-content">
            <!-- KPIs -->
            <div id="tab-operativo" class="tab-content">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                    <div class="glass-card p-8 rounded-3xl">
                        <p class="text-xs font-black text-slate-500 uppercase mb-4">Total Planillas</p>
                        <div id="kpi-planillas" class="text-5xl font-bold text-white">0</div>
                    </div>
                    <div class="glass-card p-8 rounded-3xl">
                        <p class="text-xs font-black text-slate-500 uppercase mb-4">% Retorno Cubetas</p>
                        <div id="kpi-perc-retorno-cubetas" class="text-5xl font-bold text-blue-400">0%</div>
                    </div>
                    <div id="card-neveras" class="glass-card p-8 rounded-3xl border-b-4">
                        <p id="label-neveras" class="text-xs font-black uppercase mb-4">Balance Neveras</p>
                        <div id="kpi-neveras-diff" class="text-5xl font-bold">0</div>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8 text-center md:text-left">
                    <div class="glass-card p-6 rounded-2xl border-l-4 border-cyan-500">
                        <p class="text-[10px] font-black text-slate-500 uppercase mb-2">Cubetas Salieron</p>
                        <div id="kpi-cub-salieron" class="text-2xl font-bold">0</div>
                    </div>
                    <div class="glass-card p-6 rounded-2xl border-l-4 border-amber-500">
                        <p class="text-[10px] font-black text-slate-500 uppercase mb-2">Cubetas Ingresaron</p>
                        <div id="kpi-cub-ingresaron" class="text-2xl font-bold">0</div>
                    </div>
                    <div class="glass-card p-6 rounded-2xl border-l-4 border-emerald-500">
                        <p class="text-[10px] font-black text-slate-500 uppercase mb-2">% Global Mensual</p>
                        <div id="kpi-perc-global" class="text-2xl font-bold">0%</div>
                    </div>
                </div>

                <div class="glass-card p-8 rounded-3xl h-[450px]">
                    <h3 class="font-bold mb-8 text-slate-400 uppercase text-xs tracking-widest flex items-center gap-2">
                        <i data-lucide="line-chart" class="w-4 h-4"></i> Trading Diario
                    </h3>
                    <div class="h-full relative"><canvas id="tradingChart"></canvas></div>
                </div>
            </div>

            <!-- TABLAS -->
            <div id="tab-plasticas" class="tab-content hidden">
                <div class="glass-card rounded-3xl overflow-hidden">
                    <table class="w-full text-left">
                        <thead class="bg-slate-900/50 text-slate-500 uppercase text-[10px] font-black">
                            <tr>
                                <th class="px-8 py-5">Ruta</th>
                                <th class="px-8 py-5 text-center">Despacho</th>
                                <th class="px-8 py-5 text-center">Retorno</th>
                                <th class="px-8 py-5 text-center">Eficiencia</th>
                            </tr>
                        </thead>
                        <tbody id="rutaTableBody" class="divide-y divide-slate-800"></tbody>
                    </table>
                </div>
            </div>

            <div id="tab-auxiliares" class="tab-content hidden">
                <div class="glass-card rounded-3xl overflow-hidden">
                    <table class="w-full text-left">
                        <thead class="bg-slate-900/50 text-slate-500 uppercase text-[10px] font-black">
                            <tr>
                                <th class="px-8 py-5">Auxiliar</th>
                                <th class="px-8 py-5 text-center">Viajes</th>
                                <th class="px-8 py-5 text-center">Novedades</th>
                            </tr>
                        </thead>
                        <tbody id="auxTableBody" class="divide-y divide-slate-800"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <script>
        const GOOGLE_SHEET_CSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQQEKeP2MiCBr44H8Ib1DebEqAz77tFEzKfgLxX6ygxixdQRyMNyhqQU63yNl-SBj3W1MjOYlMPhLkK/pub?output=csv';
        
        let rawData = [];
        let chartInstance = null;

        // Mapeo inteligente con soporte para variaciones comunes
        const colMap = {
            mes: ['MES', 'mes', 'Mes'],
            fecha: ['FECHA', 'fecha', 'Fecha'],
            cubetas: ['CUBETAS', 'cubetas', 'Cubetas'],
            neveras: ['NEVERAS', 'neveras', 'Neveras'],
            ret_cub: ['retorno cubetas', 'RETORNO CUBETAS', 'Retorno cubetas', 'retorno_cubetas'],
            ret_nev: ['Retorno neveras', 'RETORNO NEVERAS', 'retorno neveras', 'Retorno_neveras'],
            perc_ret: ['%retorno', '% RETORNO', '% Retorno', 'porcentaje retorno'],
            ruta: ['RUTA', 'ruta', 'Ruta'],
            aux: ['AUXILIAR', 'auxiliar', 'Auxiliar'],
            nov: ['TOTAL NOVEDADES', 'total novedades', 'Total Novedades']
        };

        function getVal(row, key) {
            const possibleNames = colMap[key];
            for (let name of possibleNames) {
                if (row[name] !== undefined) return row[name];
            }
            return 0;
        }

        window.onload = () => {
            lucide.createIcons();
            fetchData();
        };

        async function fetchData() {
            try {
                const response = await fetch(GOOGLE_SHEET_CSV);
                const csvText = await response.text();
                rawData = parseCSV(csvText);

                if (rawData.length > 0) {
                    document.getElementById('status-dot').className = "w-2 h-2 bg-emerald-500 rounded-full";
                    document.getElementById('status-text').innerText = "Conectado";
                    populateMonthFilter();
                    applyFilters();
                } else {
                    throw new Error("No se detectaron datos");
                }
            } catch (error) {
                console.error(error);
                document.getElementById('status-dot').className = "w-2 h-2 bg-rose-500 rounded-full";
                document.getElementById('status-text').innerText = "Error en Filas";
                alert("Error: Asegúrate de que la Fila 2 de tu Google Sheet tenga los encabezados (FECHA, MES, etc.)");
            }
            document.getElementById('loader').style.display = 'none';
        }

        function parseCSV(text) {
            const lines = text.split(/\r?\n/).filter(l => l.trim() !== '');
            if (lines.length < 1) return [];

            // Lógica para encontrar la fila de encabezados automáticamente
            let headerIndex = -1;
            for (let i = 0; i < lines.length; i++) {
                const row = lines[i].toLowerCase();
                // Buscamos una fila que contenga al menos palabras clave
                if (row.includes('mes') || row.includes('fecha') || row.includes('planilla')) {
                    headerIndex = i;
                    break;
                }
            }

            if (headerIndex === -1) return []; // No se encontró encabezado

            const headers = lines[headerIndex].split(',').map(h => h.trim().replace(/"/g, ''));
            
            // Empezamos a procesar desde la siguiente fila después del encabezado
            return lines.slice(headerIndex + 1).map(line => {
                const values = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                let obj = {};
                headers.forEach((h, i) => {
                    let val = values[i] ? values[i].trim().replace(/"/g, '') : "";
                    obj[h] = isNaN(val) || val === "" ? val : parseFloat(val);
                });
                return obj;
            });
        }

        function populateMonthFilter() {
            const select = document.getElementById('month-filter');
            const months = [...new Set(rawData.map(r => getVal(r, 'mes')))].filter(m => m && m !== 0);
            
            if (months.length === 0) {
                select.innerHTML = '<option value="">No se halló col. MES</option>';
                return;
            }
            select.innerHTML = months.map(m => `<option value="${m}">${m}</option>`).join('');
            select.value = months[months.length - 1];
        }

        function applyFilters() {
            const month = document.getElementById('month-filter').value;
            const filtered = rawData.filter(r => getVal(r, 'mes') === month);
            updateDashboard(filtered);
        }

        function updateDashboard(data) {
            const total = data.length;
            const cS = data.reduce((a, b) => a + (getVal(b, 'cubetas') || 0), 0);
            const cR = data.reduce((a, b) => a + (getVal(b, 'ret_cub') || 0), 0);
            const nS = data.reduce((a, b) => a + (getVal(b, 'neveras') || 0), 0);
            const nR = data.reduce((a, b) => a + (getVal(b, 'ret_nev') || 0), 0);
            const pSum = data.reduce((a, b) => a + (getVal(b, 'perc_ret') || 0), 0);

            document.getElementById('kpi-planillas').innerText = total;
            document.getElementById('kpi-perc-retorno-cubetas').innerText = (pSum/total || 0).toFixed(1) + "%";
            
            const nDiff = nR - nS;
            document.getElementById('kpi-neveras-diff').innerText = Math.abs(nDiff);
            document.getElementById('label-neveras').innerText = nDiff < 0 ? "Neveras Faltantes" : "Neveras de Más";
            document.getElementById('card-neveras').style.borderColor = nDiff < 0 ? '#f43f5e' : '#10b981';
            document.getElementById('card-neveras').style.color = nDiff < 0 ? '#fb7185' : '#34d399';

            document.getElementById('kpi-cub-salieron').innerText = cS;
            document.getElementById('kpi-cub-ingresaron').innerText = cR;
            document.getElementById('kpi-perc-global').innerText = cS > 0 ? ((cR/cS)*100).toFixed(1) + "%" : "0%";

            renderChart(data);
            renderTables(data);
        }

        function renderChart(data) {
            const days = [...new Set(data.map(r => getVal(r, 'fecha')))].sort();
            const s = days.map(d => data.filter(r => getVal(r, 'fecha') === d).reduce((a, b) => a + (getVal(b, 'cubetas') || 0), 0));
            const r = days.map(d => data.filter(r => getVal(r, 'fecha') === d).reduce((a, b) => a + (getVal(b, 'ret_cub') || 0), 0));

            const ctx = document.getElementById('tradingChart').getContext('2d');
            if (chartInstance) chartInstance.destroy();
            chartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: days.map(d => d.toString().split('-').pop()),
                    datasets: [
                        { label: 'Salida', data: s, borderColor: '#3b82f6', tension: 0.4, fill: true, backgroundColor: 'rgba(59, 130, 246, 0.05)' },
                        { label: 'Retorno', data: r, borderColor: '#fbbf24', tension: 0.4 }
                    ]
                },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { grid: { color: '#1e293b' } }, x: { grid: { display: false } } } }
            });
        }

        function renderTables(data) {
            const rutaBody = document.getElementById('rutaTableBody');
            const auxBody = document.getElementById('auxTableBody');
            rutaBody.innerHTML = ''; auxBody.innerHTML = '';

            const routes = [...new Set(data.map(r => getVal(r, 'ruta')))];
            routes.forEach(rt => {
                const group = data.filter(r => getVal(r, 'ruta') === rt);
                const s = group.reduce((a, b) => a + (getVal(b, 'cubetas') || 0), 0);
                const r = group.reduce((a, b) => a + (getVal(b, 'ret_cub') || 0), 0);
                const p = s > 0 ? ((r/s)*100).toFixed(1) : 0;
                rutaBody.innerHTML += `<tr class="hover:bg-slate-800/30 transition-colors">
                    <td class="px-8 py-4 font-bold text-slate-300">${rt}</td>
                    <td class="px-8 py-4 text-center">${s}</td>
                    <td class="px-8 py-4 text-center text-blue-400">${r}</td>
                    <td class="px-8 py-4 text-center font-black ${p < 90 ? 'text-rose-500' : 'text-emerald-500'}">${p}%</td>
                </tr>`;
            });

            const auxs = [...new Set(data.map(r => getVal(r, 'aux')))].filter(a => a);
            auxs.forEach(ax => {
                const group = data.filter(r => getVal(r, 'aux') === ax);
                const nov = group.reduce((a, b) => a + (getVal(b, 'nov') || 0), 0);
                auxBody.innerHTML += `<tr><td class="px-8 py-4 font-bold text-blue-200">${ax}</td><td class="px-8 py-4 text-center">${group.length}</td><td class="px-8 py-4 text-center text-orange-400 font-bold">${nov}</td></tr>`;
            });
        }

        function showTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden'));
            document.getElementById('tab-' + tabId).classList.remove('hidden');
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('tab-active', 'text-white'));
            document.getElementById('btn-' + tabId).classList.add('tab-active');
        }
    </script>
</body>
</html>
